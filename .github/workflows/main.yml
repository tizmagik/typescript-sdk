on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Install pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
              id: pnpm-install
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install
            - run: pnpm run check:all
            - run: pnpm run build:all

    test:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: [20, 22, 24]

        steps:
            - uses: actions/checkout@v6

            - name: Install pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
              id: pnpm-install
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - run: pnpm install

            - run: pnpm test:all

    test-runtimes:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runtime: bun
                      version: "1.x"
                    - runtime: deno
                      version: v2.x
        steps:
            - uses: actions/checkout@v6
            - name: Install pnpm
              uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
              with:
                  run_install: false
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml
            - name: Set up Bun
              if: matrix.runtime == 'bun'
              uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
              with:
                  bun-version: ${{ matrix.version }}
            - name: Set up Deno
              if: matrix.runtime == 'deno'
              uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
              with:
                  deno-version: ${{ matrix.version }}
            - run: pnpm install
            - run: pnpm build:all
            - name: Run ${{ matrix.runtime }} integration tests
              run: pnpm --filter @modelcontextprotocol/test-integration test:integration:${{ matrix.runtime }}

